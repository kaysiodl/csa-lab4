name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tools
        run: pip install ruff mypy pytest pyyaml

      - name: Ruff (lint)
        run: ruff check

      - name: Mypy (types)
        run: mypy

      - name: Pytest (golden tests)
        run: pytest golden.py -v
