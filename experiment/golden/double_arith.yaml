in_source: |-
  (var a (array 4))
  (var b (array 4))
  (var r (array 4))
  (var i 0)
  (while (< i 4) (aset a i (read)) (set i (+ i 1)))
  (set i 0)
  (while (< i 4) (aset b i (read)) (set i (+ i 1)))
  (var carry 0)
  (var s 0)
  (set i 0)
  (while (< i 4)
      (set s (+ (+ (aref a i) (aref b i)) carry))
      (aset r i (% s 65536))
      (set carry (/ s 65536))
      (set i (+ i 1)))
  (set i 0)
  (while (< i 4) (print (aref r i)) (set i (+ i 1)))
