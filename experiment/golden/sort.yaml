in_source: |-
  (var n (read))
  (var arr (array 20))
  (var i 0)
  (while (< i n)
      (aset arr i (read))
      (set i (+ i 1)))
  (var j 0)
  (var temp 0)
  (var swapped 1)
  (while (= swapped 1)
      (set swapped 0)
      (set j 0)
      (while (< j (- n 1))
          (var cmp (> (aref arr j) (aref arr (+ j 1))))
          (if (= cmp 1) (set temp (aref arr j)) 0)
          (if (= cmp 1) (aset arr j (aref arr (+ j 1))) 0)
          (if (= cmp 1) (aset arr (+ j 1) temp) 0)
          (if (= cmp 1) (set swapped 1) 0)
          (set j (+ j 1))))
  (set i 0)
  (while (< i n)
      (print (aref arr i))
      (set i (+ i 1)))
