in_source: |-
  (def is_palindrome (n)
      (var original n)
      (var temp n)
      (var reversed 0)
      (var rem 0)
      (while (> temp 0)
          (set rem (% temp 10))
          (set reversed (+ (* reversed 10) rem))
          (set temp (/ temp 10)))
      (= reversed original))

  (var max_pal 0)
  (var i 1000)
  (while (> (set i (- i 1)) 99)
      (var j 1000)
      (if (< (* i 999) max_pal)
          (set i 99)
          0)
      (while (> (set j (- j 1)) (- i 1))
          (var prod (* i j))
          (if (< prod max_pal)
              (set j i)
              (if (call is_palindrome prod)
                  (set max_pal prod)
                  0))))
  (print max_pal)
